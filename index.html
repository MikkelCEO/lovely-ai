<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PC Phone</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin-bottom: 20px;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    #log {
      width: 100%;
      max-width: 600px;
      height: 300px;
      background: #020617;
      border-radius: 10px;
      padding: 15px;
      overflow-y: auto;
      font-size: 14px;
    }

    .entry {
      margin-bottom: 6px;
    }

    .ok { color: #22c55e; }
    .err { color: #ef4444; }
    .info { color: #38bdf8; }
  </style>
</head>

<body>

<h2>📞 PC Phone</h2>

<button id="callBtn" disabled>Call</button>

<div id="log"></div>

<script type="module" src="./main.js"></script>

</body>
</html>
