<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PC Phone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-zinc-900 rounded-3xl shadow-2xl overflow-hidden border border-zinc-800">
    
    <div class="bg-zinc-950 px-6 py-5 flex items-center justify-between border-b border-zinc-800">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-xl">📞</div>
        <div>
          <h1 class="text-xl font-semibold">PC Phone</h1>
          <p class="text-zinc-500 text-xs">Twilio Voice</p>
        </div>
      </div>
      <div class="flex items-center gap-2 text-emerald-400">
        <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
        <span class="text-xs font-medium">Online</span>
      </div>
    </div>

    <div class="p-6 border-b border-zinc-800 bg-zinc-950">
      <div class="flex justify-between text-sm">
        <div>
          <p class="text-zinc-400">Calling</p>
          <p id="to" class="font-mono text-lg font-medium">+4915888654546</p>
        </div>
        <div class="text-right">
          <p class="text-zinc-400">From</p>
          <p id="from" class="font-mono text-lg font-medium">+18392616244</p>
        </div>
      </div>
    </div>

    <div class="p-8 flex gap-4 justify-center bg-zinc-900">
      <button id="callBtn" disabled class="flex-1 bg-emerald-500 hover:bg-emerald-600 disabled:bg-zinc-700 py-4 rounded-2xl flex items-center justify-center gap-3 font-semibold text-lg">
        <i class="fas fa-phone"></i> Call
      </button>
      <button id="endBtn" disabled class="flex-1 bg-red-500 hover:bg-red-600 disabled:bg-zinc-700 py-4 rounded-2xl flex items-center justify-center gap-3 font-semibold text-lg">
        <i class="fas fa-phone-slash"></i> End
      </button>
    </div>

    <!-- Audio Controls -->
    <div class="px-6 pb-6 space-y-6">
      <div>
        <div class="flex items-center gap-3 text-xs text-zinc-400 mb-1">
          <i class="fas fa-volume-up"></i> <span>Speaker Volume</span>
        </div>
        <input id="speakerSlider" type="range" min="0" max="1" step="0.01" value="1" class="w-full accent-emerald-500">
      </div>

      <div>
        <div class="flex items-center gap-3 text-xs text-zinc-400 mb-1">
          <i class="fas fa-microphone"></i> <span>Mic Gain</span>
        </div>
        <input id="micSlider" type="range" min="0" max="1" step="0.01" value="1" class="w-full accent-sky-500">
      </div>

      <!-- Voice Levels -->
      <div class="grid grid-cols-2 gap-4 text-xs">
        <div>
          <div class="text-zinc-400 mb-1 flex items-center gap-2">
            <i class="fas fa-microphone"></i> Mic Level
          </div>
          <div id="micLevel" class="h-2 bg-zinc-800 rounded-full overflow-hidden">
            <div id="micBar" class="h-full bg-sky-400 w-0 transition-all"></div>
          </div>
        </div>
        <div>
          <div class="text-zinc-400 mb-1 flex items-center gap-2">
            <i class="fas fa-volume-up"></i> Speaker Level
          </div>
          <div id="speakerLevel" class="h-2 bg-zinc-800 rounded-full overflow-hidden">
            <div id="speakerBar" class="h-full bg-emerald-400 w-0 transition-all"></div>
          </div>
        </div>
      </div>

      <div id="log" class="bg-zinc-950 border border-zinc-800 rounded-2xl h-48 p-4 overflow-y-auto text-sm font-mono space-y-1"></div>
    </div>
  </div>

<script type="module">
import { Device } from "@twilio/voice-sdk";

let device, currentCall = null;
const CALL = "+4915888654546";
const FROM = "+18392616244";

document.getElementById("to").textContent = CALL;
document.getElementById("from").textContent = FROM;

const logBox = document.getElementById("log");
const speakerSlider = document.getElementById("speakerSlider");
const micSlider = document.getElementById("micSlider");
const micBar = document.getElementById("micBar");
const speakerBar = document.getElementById("speakerBar");

function log(text, color = "text-zinc-400") {
  const entry = document.createElement("div");
  entry.className = color;
  entry.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
  logBox.appendChild(entry);
  logBox.scrollTop = logBox.scrollHeight;
}

async function init() {
  try {
    log("Fetching token...");
    const res = await fetch("http://localhost:5000/token");
    const data = await res.json();

    device = new Device(data.token, { logLevel: 1 });

    device.on("registered", () => {
      log("Device registered ✓", "text-emerald-400");
      document.getElementById("callBtn").disabled = false;
    });

    device.on("error", (e) => log("Device error: " + e.message, "text-red-400"));

    await device.register();
  } catch (e) {
    log("Init failed: " + e.message, "text-red-400");
  }
}

document.getElementById("callBtn").onclick = async () => {
  try {
    log("Connecting call...", "text-emerald-400");
    currentCall = await device.connect({ params: { To: CALL } });
    document.getElementById("endBtn").disabled = false;

    currentCall.on("accept", () => log("Call active", "text-emerald-400"));

    currentCall.on("volume", (inputVolume, outputVolume) => {
      micBar.style.width = `${inputVolume * 100}%`;
      speakerBar.style.width = `${outputVolume * 100}%`;
    });

    currentCall.on("disconnect", () => {
      log("Call ended", "text-red-400");
      document.getElementById("endBtn").disabled = true;
      currentCall = null;
      micBar.style.width = "0%";
      speakerBar.style.width = "0%";
    });

    currentCall.on("error", (e) => log("Call error: " + e.message, "text-red-400"));
  } catch (e) {
    log("Call failed: " + e.message, "text-red-400");
  }
};

document.getElementById("endBtn").onclick = () => {
  if (currentCall) currentCall.disconnect();
};

// Speaker volume
speakerSlider.addEventListener("input", () => {
  if (currentCall) {
    currentCall.volume(parseFloat(speakerSlider.value));
    log(`Speaker: ${Math.round(speakerSlider.value*100)}%`, "text-emerald-400");
  }
});

// Mic gain (via device if supported)
micSlider.addEventListener("input", () => {
  log(`Mic gain set: ${Math.round(micSlider.value*100)}%`, "text-sky-400");
  // Note: Real mic gain often requires custom Web Audio setup
});

init();
</script>
</body>
</html>
