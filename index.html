<!DOCTYPE html>
<html>
<head>
<script src="https://media.twiliocdn.com/sdk/js/voice/latest/twilio.min.js"></script>
</head>
<body>
<button id="callBtn" disabled>Call Sister</button>

<script>
let device;

async function init() {
  try {
    const res = await fetch('http://localhost:5000/token');
    const data = await res.json();

    console.log("TOKEN:", data.token); // 👈 ADD THIS

    device = new Twilio.Device(data.token, {
      logLevel: 3
    });

    device.on('registered', () => {
      console.log('✅ REGISTERED');
      document.getElementById("callBtn").disabled = false;
    });

    device.on('error', (error) => {
      console.error('❌ ERROR:', error);
    });

    device.on('connecting', () => console.log('📞 CONNECTING'));
    device.on('connect', () => console.log('✅ CONNECTED'));
    device.on('disconnect', () => console.log('🔌 DISCONNECTED'));

  } catch (e) {
    console.error('❌ FETCH ERROR:', e);
  }
}

init();
</script>
</body>
</html>
